<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Темний фон з округленими кутами -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <!-- Літера C стилізована як замок/щит — читається навіть на 16px -->
  <!-- Зовнішня дуга C -->
  <path d="M42 16 C24 16 16 22 16 32 C16 42 24 48 42 48"
        fill="none" stroke="#3b82f6" stroke-width="7" stroke-linecap="round"/>
  <!-- Маленька горизонтальна риска всередині C — як перекладина замка -->
  <line x1="23" y1="32" x2="34" y2="32" stroke="#60a5fa" stroke-width="4" stroke-linecap="round"/>
  <!-- Крапка-точка зліва — акцент, робить схожим на іконку замка -->
  <circle cx="20" cy="32" r="2.5" fill="#93c5fd"/>
</svg>
